<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Grid - Columns & Rows</title>
  <link rel="stylesheet" href="Grid.css">   
  
</head>
<body>
  <h2>Grid with 3 Columns and 2 Rows</h2>
  <div class="grid-container">
    <div class="grid-item">1</div>
    <div class="grid-item">2</div>
    <div class="grid-item">3</div>
    <div class="grid-item">4</div>
    <div class="grid-item">5</div>
    <div class="grid-item">6</div>
  </div>

  <div>
    <h2>Web Page Layout using Grid/Grid Templates areas</h2>
  <div class="layout">
    <div class="header">Header</div>
    <div class="menu">Menu</div>
    <div class="main">Main Content</div>
    <div class="aside">Sidebar</div>
    <div class="footer">Footer</div>
  </div>

   <!-- /* Grid Item Properties */
    /* 1. grid-column */ -->

    <h2>Grid Column Span</h2>
  <div class="grid-container2">
    <div class="grid-item span-columns">Spanning 2 Columns</div>
    <div class="grid-item">B</div>
    <div class="grid-item">C</div>
  </div>
  </div>
</body>
</html>
