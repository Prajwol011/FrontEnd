<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Tags</title>
</head>
<body>
    <h1>Text Tags</h1>
    <h1>The Journey Begains From Here</h1>
    <h2>My First Subheading</h2>
    <h3>My First Sub-subheading</h3>
    <h4>My First Sub-sub-subheading</h4>
    <h5>My First Sub-sub-sub-subheading</h5>
    <h6>My First Sub-sub-sub-sub-subheading</h6>

    <p style="color: red;">My first Paragraph</p> <!--style attribute is used to add inline CSS to an HTML element.-->
    
    <hr> <!--This represents a horizontal line.-->

    <p title="I am a tooltip" style="color: orange">My second Paragraph</p>

    <b>This is bold text</b> <br>
    <em>This is italic text</em><br> <!--Used when the tone of voice changes the meaning of the sentence-->
    <i>This is also an italic text</i> <!--Used for the terms that are traditionally slanted in italic, such as the names of ships, foreign words, or technical terms. --> <hr>
    <br>

</body>
</html>
