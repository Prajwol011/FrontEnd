<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Lists</h1>
    <!-- //HTML List  -->
    <h2>My First Unordered List</h2>
    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>
    <h2>My First Ordered List</h2>
    <ol type="A"> <!--type attribute is used to specify the type of list numbering.-->
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ol>

    <h2>My First Description List</h2>
    <dl>
        <dt>Term 1</dt>
        <dd>-Description 1</dd>
        <dt>Term 2</dt>
        <dd>-Description 2</dd>
        <dt>Term 3</dt>
        <dd>-Description 3</dd>
    </dl>
    <!-- dt- definition term -->
    <!-- dd- definition description or detail -->
     
</body>
</html>
